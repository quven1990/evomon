# Push to main → build → Cloudflare Pages deploy → purge CDN cache.
#
# Required GitHub secret: CLOUDFLARE_API_TOKEN
# Create at https://dash.cloudflare.com/profile/api-tokens → Create Custom Token
#
# Permissions (all required):
#   Account  → Cloudflare Pages     → Edit
#   Account  → Account Settings    → Read
#   User     → User Details        → Read
#   User     → Memberships         → Read
#   Zone     → Cache Purge          → Purge
#   Zone     → Zone                 → Read
#
# Account resources: Include → your account
# Zone resources:    Include → evomon.cc

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-evomon-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, deploy to Cloudflare Pages, purge cache
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a17c720d27e1e3b502bef6b0d57c5472
